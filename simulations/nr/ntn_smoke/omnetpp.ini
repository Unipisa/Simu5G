[General]
network = simu5g.simulations.nr.ntn_smoke.NtnStandaloneSmoke
sim-time-limit = 0.1s
**.routingRecorder.enabled = false
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}
**.vector-recording = false

**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

**.numBands = 50
**.ueTxPower = 26dBm
**.eNodeBTxPower = 40dBm
**.targetBler = 0.01
**.blerShift = 5

*.configurator.config = xmldoc("../standalone/demo.xml")

[Config Smoke]
description = "Minimal NTN smoke test for gNB to NTN gateway to satellite association"

*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 220m
*.gnb.isTransparentNtn = true
*.gnb.ntnGatewayId = 1024
*.gnb.satelliteId = 1280

*.ntnGateway.macNodeId = 1024
*.ntnGateway.mobility.initialX = 450m
*.ntnGateway.mobility.initialY = 350m
*.ntnGateway.relayDelay = 0s

*.satellite.macNodeId = 1280
*.satellite.mobility.initialX = 700m
*.satellite.mobility.initialY = 350m
*.satellite.relayDelay = 0s
