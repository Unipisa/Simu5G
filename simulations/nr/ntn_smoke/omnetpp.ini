[General]
network = simu5g.simulations.nr.ntn_smoke.NtnStandaloneSmoke
sim-time-limit = 2s
**.routingRecorder.enabled = false
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}
**.vector-recording = true

**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 40000km
**.mobility.initFromDisplayString = false

**.numBands = 50
**.ueTxPower = 26dBm
**.eNodeBTxPower = 40dBm
**.targetBler = 0.01
**.blerShift = 5

*.configurator.config = xmldoc("demo.xml")

##########################################################
#                Geographic Reference                    #
##########################################################
*.geoRef.x = 0m
*.geoRef.y = 0m
*.geoRef.z = 0m
*.geoRef.referenceLatitude = 43.7deg
*.geoRef.referenceLongitude = 10.4deg
*.geoRef.referenceAltitude = 0m

*.satellite.mobility.updateFromDisplayString = false
*.satellite.mobility.initFromDisplayString = false
*.satellite.mobility.initialLatitude = 0deg
*.satellite.mobility.initialLongitude = 0deg
*.satellite.mobility.initialAltitude = 35786km

*.leo*[*].mobility.typename = "LeoSatMobility"
*.leo*[*].mobility.updateDisplayString = true
*.leo*[*].mobility.updateInterval = 1s

[Config Smoke]
description = "NTN smoke test with one NR UE and one remote server exchanging CBR traffic through the gNB/satellite path"

*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 220m
*.gnb.useTransparentNtn = true
*.gnb.ntnGatewayId = 16384  # gNB-gateway association 
*.gnb.satelliteId = 17408   # gNB-sat association

*.ntnGateway.mobility.initialX = 450m
*.ntnGateway.mobility.initialY = 350m

*.ue[0].hasNtnSupport = true
*.ue[0].servingNodeId = 0
*.ue[0].nrServingNodeId = 1
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 500m

*.ue[*].numApps = 2
*.server.numApps = 2

# Downlink server -> UE
*.ue[*].app[0].typename = "CbrReceiver"
*.ue[*].app[0].localPort = 10000

*.server.app[0].typename = "CbrSender"
*.server.app[0].localPort = 3088
*.server.app[0].destAddress = "ue[0]"
*.server.app[0].destPort = 10000
*.server.app[0].packetSize = 300B
*.server.app[0].samplingTime = 10ms
*.server.app[0].startTime = 0.05s

# Uplink UE -> server
*.server.app[1].typename = "CbrReceiver"
*.server.app[1].localPort = 10001

*.ue[*].app[1].typename = "CbrSender"
*.ue[*].app[1].localPort = 3089
*.ue[*].app[1].destAddress = "server"
*.ue[*].app[1].destPort = 10001
*.ue[*].app[1].packetSize = 300B
*.ue[*].app[1].samplingTime = 10ms
*.ue[*].app[1].startTime = 0.10s

[Config LeoSmoke]
network = simu5g.simulations.nr.ntn_smoke.NtnLeoSmoke
description = "NTN smoke test with a LEO satellite instantiated from a TLE file via SatelliteInserter"

*.geoRef.x = 500m
*.geoRef.y = 500m
*.geoRef.z = 0m
*.geoRef.referenceLatitude = 0deg
*.geoRef.referenceLongitude = 0deg
*.geoRef.referenceAltitude = 0m

*.satelliteInserter.pathToTleFile = "space_Veins-1.txt"
*.satelliteInserter.ignoreUnknownSatellites = false
*.satelliteInserter.wall_clock_sim_start_time_utc = "2022-02-22-13-42-34"

*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 220m
*.gnb.useTransparentNtn = true
*.gnb.ntnGatewayId = 16384
*.gnb.satelliteId = 17408

*.ntnGateway.mobility.initialX = 450m
*.ntnGateway.mobility.initialY = 350m

*.ue[0].hasNtnSupport = true
*.ue[0].servingNodeId = 0
*.ue[0].nrServingNodeId = 1
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 500m

*.ue[*].numApps = 2
*.server.numApps = 2

*.ue[*].app[0].typename = "CbrReceiver"
*.ue[*].app[0].localPort = 10000

*.server.app[0].typename = "CbrSender"
*.server.app[0].localPort = 3088
*.server.app[0].destAddress = "ue[0]"
*.server.app[0].destPort = 10000
*.server.app[0].packetSize = 300B
*.server.app[0].samplingTime = 10ms
*.server.app[0].startTime = 0.05s

*.server.app[1].typename = "CbrReceiver"
*.server.app[1].localPort = 10001

*.ue[*].app[1].typename = "CbrSender"
*.ue[*].app[1].localPort = 3089
*.ue[*].app[1].destAddress = "server"
*.ue[*].app[1].destPort = 10001
*.ue[*].app[1].packetSize = 300B
*.ue[*].app[1].samplingTime = 10ms
*.ue[*].app[1].startTime = 0.10s
