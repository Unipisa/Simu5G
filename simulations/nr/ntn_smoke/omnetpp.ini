[General]
network = simu5g.simulations.nr.ntn_smoke.NtnStandaloneSmoke
sim-time-limit = 2s
**.routingRecorder.enabled = false
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}
**.vector-recording = true

**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

**.numBands = 50
**.ueTxPower = 26dBm
**.eNodeBTxPower = 40dBm
**.targetBler = 0.01
**.blerShift = 5

*.configurator.config = xmldoc("demo.xml")

[Config Smoke]
description = "NTN smoke test with one NR UE and one remote server exchanging CBR traffic through the gNB/satellite path"

*.gnb.macNodeId = 1
*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 220m
*.gnb.useTransparentNtn = true
*.gnb.ntnGatewayId = 1024
*.gnb.satelliteId = 1280

*.ntnGateway.macNodeId = 1024
*.ntnGateway.mobility.initialX = 450m
*.ntnGateway.mobility.initialY = 350m

*.satellite.macNodeId = 1280
*.satellite.mobility.initialX = 700m
*.satellite.mobility.initialY = 350m

*.numUe = 1
*.ue[0].macNodeId = 1536
*.ue[0].nrMacNodeId = 2560
*.ue[0].servingNodeId = 0
*.ue[0].nrServingNodeId = 1
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 320m

*.ue[*].numApps = 2
*.server.numApps = 2

# Downlink server -> UE
*.ue[*].app[0].typename = "CbrReceiver"
*.ue[*].app[0].localPort = 10000

*.server.app[0].typename = "CbrSender"
*.server.app[0].localPort = 3088
*.server.app[0].destAddress = "ue[0]"
*.server.app[0].destPort = 10000
*.server.app[0].packetSize = 300B
*.server.app[0].samplingTime = 10ms
*.server.app[0].startTime = 0.05s

# Uplink UE -> server
*.server.app[1].typename = "CbrReceiver"
*.server.app[1].localPort = 10001

*.ue[*].app[1].typename = "CbrSender"
*.ue[*].app[1].localPort = 3089
*.ue[*].app[1].destAddress = "server"
*.ue[*].app[1].destPort = 10001
*.ue[*].app[1].packetSize = 300B
*.ue[*].app[1].samplingTime = 10ms
*.ue[*].app[1].startTime = 0.10s
