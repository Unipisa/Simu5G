[General]
abstract = true
sim-time-limit=20s
**.routingRecorder.enabled = false

############### Statistics ##################
output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec
seed-set = ${repetition}
**.vector-recording = true

################ Mobility parameters #####################
# *

**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

############### Number of Resource Blocks ################
**.numBands = 50 # this value should be kept equal to the number of RBs

############### Transmission Power ##################
**.ueTxPower = 26dBm
**.eNodeBTxPower = 40dBm
**.targetBler = 0.01
**.blerShift = 5

############### IPv4 configurator config #################
*.configurator.config = xmldoc("./demo.xml")


#------------------------------------#
# Config Standalone
#
# Topology configuration for the exemplary scenario for NR Standalone deployment
#
[Config Standalone]
network = simu5g.simulations.nr.networks.SingleCell_Standalone
sim-time-limit=20s

############### e/gNodeB configuration #################
*.gnb.mobility.initialX = 450m
*.gnb.mobility.initialY = 300m

############## UE configuration ##################
*.numUe = 1

# connect the UE's NIC to the corresponding serving gNB (NR side only)
*.ue[0].servingNodeId = 0
*.ue[0].nrServingNodeId = 1

# UE position
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 350m
#------------------------------------#



#------------------------------------#
# Config VoIP-DL
#
# General configuration for Voice-over-IP DL traffic to the UE
#
[Config VoIP-DL]
extends=Standalone

# one UDP application for each user
*.ue[*].numApps = 1

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps)
*.server.numApps = 1

#============= Application Setup =============
*.ue[*].app[*].typename = "VoipReceiver"
*.ue[*].app[0].localPort = 3000

*.server.app[*].packetSize = 40B
*.server.app[*].destAddress = "ue[0]" # obtain the address of the client by reading its index in the array of udp Apps
*.server.app[*].localPort = 3088+ancestorIndex(0)
*.server.app[*].typename = "VoipSender"
*.server.app[*].startTime = uniform(0s,0.02s)
#------------------------------------#



#------------------------------------#
# Config VoIP-UL
#
# General configuration for Voice-over-IP UL traffic from the UE
#
[Config VoIP-UL]
extends=Standalone

# one UDP application for each user
*.ue[*].numApps = 1

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps)
*.server.numApps = 1

#============= Application Setup =============
*.server.app[*].typename = "VoipReceiver"
*.server.app[*].localPort = 3000+ancestorIndex(0)

*.ue[*].app[*].packetSize = 40B
# obtain the address of the client by reading its index in the array of udp Apps
*.ue[*].app[*].destAddress = "server"
*.ue[*].app[*].localPort = 3088+ancestorIndex(0)
*.ue[*].app[*].typename = "VoipSender"
*.ue[*].app[*].startTime = uniform(0s,0.02s)
#------------------------------------#



#------------------------------------#
# Config VoIP-DL-AM
#
# Voice-over-IP DL traffic using RLC Acknowledged Mode (AM)
#
[Config VoIP-DL-AM]
extends=VoIP-DL

# Activate RLC-AM for VoIP (conversational) traffic
**.pdcp.conversationalRlc = "AM"

# Use NR RLC-AM implementation
*.gnb.cellularNic.rlc.am.typename = "NrRlcAm"
*.ue[*].cellularNic.nrRlc.am.typename = "NrRlcAm"
#------------------------------------#



#------------------------------------#
# Config VoIP-DL-AM-Lossy
#
# Same as VoIP-DL-AM but with poor channel conditions to trigger
# HARQ failures and exercise the RLC-AM ARQ retransmission mechanism.
#
[Config VoIP-DL-AM-Lossy]
extends=VoIP-DL-AM

# Place the UE far from the gNB (~3700 m: gNB at y=300 m, UE at y=4000 m below)
# and enlarge the constraint area to fit it, so the DL SINR is marginal. The UE
# is stationary -- Jakes fast-fading is enabled but at speed 0 it is static in
# time -- so the resulting losses are random per-transmission failures at the
# operating BLER, not time-varying fades.
**.mobility.constraintAreaMaxX = 5000m
**.mobility.constraintAreaMaxY = 5000m
*.ue[0].mobility.initialX = 450m
*.ue[0].mobility.initialY = 4000m

# Increase UE TX power to match gNB so that UL works at the same distance as DL.
# Without this, the 14 dB power asymmetry (40 dBm gNB vs 26 dBm UE) makes UL
# unusable at distances where DL is marginal, preventing STATUS PDU delivery.
**.ueTxPower = 40dBm

# Allow a single HARQ retransmission. This must be the same on both ends (it is
# also used by the receiver to track HARQ processes), so it cannot be set per
# direction. Keeping it >0 is what makes the uplink reliable enough for the UE's
# RLC-AM STATUS PDUs to reach the gNB, so NACKed SDUs actually get retransmitted
# and the gaps close again. With maxHarqRtx=0 the STATUS PDUs are lost on the UL
# too, the gNB never learns about the gaps, and the STATUS PDU grows without bound.
**.maxHarqRtx = 1

# Raise the target BLER so the scheduler picks a less robust MCS. Combined with the
# single HARQ retransmission above, this lets a few DL PDUs fail and leak past HARQ,
# creating occasional RLC-AM gaps: the UE then emits a STATUS PDU carrying a
# NACK (>3 B), and once the gNB retransmits the SDU the STATUS returns to a 3-byte
# pure ACK. Tuned (with maxHarqRtx=1) to produce a few such grow-then-shrink events
# within the first 20 s rather than a permanent backlog.
**.targetBler = 0.3

#------------------------------------#



#------------------------------------#
# Config VoIP-UL-AM
#
# Voice-over-IP UL traffic using RLC Acknowledged Mode (AM)
#
[Config VoIP-UL-AM]
extends=VoIP-UL

# Activate RLC-AM for VoIP (conversational) traffic
**.pdcp.conversationalRlc = "AM"

# Use NR RLC-AM implementation
*.gnb.cellularNic.rlc.am.typename = "NrRlcAm"
*.ue[*].cellularNic.nrRlc.am.typename = "NrRlcAm"
#------------------------------------#
