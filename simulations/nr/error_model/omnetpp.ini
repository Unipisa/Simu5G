[General]
abstract = true
sim-time-limit = 30s
warmup-period = 0s
seed-set = ${repetition}

############### Output ##################
output-scalar-file = ${resultdir}/${configname}/${iterationvars}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${iterationvars}-${repetition}.vec
**.scalar-recording = true
**.vector-recording = true
**.routingRecorder.enabled = false

############### Mobility ################
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMaxX = 2000m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxY = 2000m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

############### Carrier and PHY #########
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex = 0
*.carrierAggregation.componentCarrier[0].carrierFrequency = 2GHz
*.carrierAggregation.componentCarrier[0].numBands = 25

**.amcType = "NrAmc"
**.pilotMode = "ROBUST_CQI"
**.targetBler = 0.01
**.blerShift = 5
**.eNodeBTxPower = 20dBm
**.ueTxPower = 10dBm
**.downlinkInterference = false
**.uplinkInterference = false
**.collectSinrStatistics = true

############### IPv4 ####################
*.configurator.config = xmldoc("./demo.xml")


[Config ErrorModelBase]
abstract = true
network = simu5g.simulations.nr.networks.SingleCell_Standalone

############### gNB #####################
*.gnb.mobility.initialX = 500m
*.gnb.mobility.initialY = 500m

########## Background traffic #############
*.numBgCells = 1

*.bgCell[*].bgScheduler.isNr = true
*.bgCell[*].bgScheduler.txPower = 20dBm
*.bgCell[*].bgScheduler.numBands = 25

# position of the background gNodeB
*.bgCell[*].mobility.initialX = 1500m
*.bgCell[*].mobility.initialY = 500m

# number and position of background UEs in the background cells
*.bgCell[*].bgTrafficGenerator.numBgUes = 3
*.bgCell[*].bgTrafficGenerator.bgUE[*].mobility.initialX = uniform(1000m,2000m)
*.bgCell[*].bgTrafficGenerator.bgUE[*].mobility.initialY = uniform(0m,1000m)

# Background traffic in the background cells
*.bgCell[*].bgTrafficGenerator.bgUE[*].generator.typename = "TrafficGeneratorCbr"
*.bgCell[*].bgTrafficGenerator.bgUE[*].generator.startTimeDl = uniform(0s,0.05s)
*.bgCell[*].bgTrafficGenerator.bgUE[*].generator.packetSizeDl = 3000B
*.bgCell[*].bgTrafficGenerator.bgUE[*].generator.periodDl = 10ms

############### UE ######################
*.numUe = 1
*.ue[0].servingNodeId = 0
*.ue[0].nrServingNodeId = 1
*.ue[0].mobility.typename = "StationaryMobility"
*.ue[0].mobility.initialX = ${ueX=500m,700m,900m}
*.ue[0].mobility.initialY = 500m

############### Application #############
*.ue[0].numApps = 1
*.ue[0].app[0].typename = "CbrReceiver"
*.ue[0].app[0].localPort = 10000

*.server.numApps = 1
*.server.app[0].typename = "CbrSender"
*.server.app[0].packetSize = 3000B
*.server.app[0].samplingTime = 10ms
*.server.app[0].destAddress = "ue[0]"
*.server.app[0].destPort = 10000
*.server.app[0].localPort = 3088
*.server.app[0].tos = 10
*.server.app[0].startTime = 0.05s


[Config IndependentRB]
extends = ErrorModelBase
description = "Legacy independent per-resource-block BLER aggregation"
**.cellularNic.errorModelType = "IndependentResourceBlockErrorModel"

[Config Eesm]
extends = ErrorModelBase
description = "Exponential effective SINR mapping"
**.cellularNic.errorModelType = "EesmErrorModel"

[Config Miesm]
extends = ErrorModelBase
description = "Mutual-information effective SINR mapping"
**.cellularNic.errorModelType = "MiesmErrorModel"
