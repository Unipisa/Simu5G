[General]
include ../standalone/omnetpp.ini

[Config FeedbackSmokeBase]
extends = Standalone
sim-time-limit = 200ms

output-scalar-file = ${resultdir}/${configname}/${repetition}.sca
output-vector-file = ${resultdir}/${configname}/${repetition}.vec

*.configurator.config = xmldoc("../standalone/demo.xml")

*.ue[*].cellularNic.nrChannelModel[0].collectSinrStatistics = true

*.ue[*].cellularNic.nrPhy.enableHandover = false
*.gnb.cellularNic.phy.enableHandover = false

*.ue[*].mobility.initialX = 450m
*.ue[*].mobility.initialY = 350m

**.vector-recording = false

[Config UeDlCsiRsFeedbackSmoke]
description = "Smoke test for UE-computed DL feedback driven by periodic CSI-RS in NR standalone"
extends = FeedbackSmokeBase

*.gnb.cellularNic.phy.useUeDlFeedbackComputation = true
*.gnb.cellularNic.phy.csiRsPeriod = 10tti
*.ue[*].cellularNic.nrPhy.useUeDlFeedbackComputation = true

*.ue[*].cellularNic.nrDlFbGen.usePeriodic = true
*.ue[*].cellularNic.nrDlFbGen.fbPeriod = 20tti
*.ue[*].cellularNic.nrDlFbGen.fbDelay = 1tti

[Config UeUlSrsFeedbackSmoke]
description = "Smoke test for e/gNB-computed UL feedback driven by periodic SRS in NR standalone"
extends = FeedbackSmokeBase

*.gnb.cellularNic.phy.useSrsUlFeedbackComputation = true
*.gnb.cellularNic.phy.srsPeriod = 10tti

**.measuredSinrUl.vector-recording = true

[Config UeDlUlFeedbackSmoke]
description = "Smoke test for UE-computed DL feedback plus e/gNB-computed UL feedback in NR standalone"
extends = FeedbackSmokeBase

*.gnb.cellularNic.phy.useUeDlFeedbackComputation = true
*.gnb.cellularNic.phy.csiRsPeriod = 10tti
*.gnb.cellularNic.phy.useSrsUlFeedbackComputation = true
*.gnb.cellularNic.phy.srsPeriod = 10tti
*.ue[*].cellularNic.nrPhy.useUeDlFeedbackComputation = true

*.ue[*].cellularNic.nrDlFbGen.usePeriodic = true
*.ue[*].cellularNic.nrDlFbGen.fbPeriod = 20tti
*.ue[*].cellularNic.nrDlFbGen.fbDelay = 1tti

**.measuredSinrUl.vector-recording = true
